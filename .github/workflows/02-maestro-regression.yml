name: "Maestro — Full Regression (Android)"

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      flow:
        description: "Flow number to run solo (e.g. 07). Leave empty for full regression."
        required: false
        default: ""

concurrency:
  # Cancel in-progress regression when a new push lands so CI stays fresh.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Full Regression (Android API 33)
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Download APK from GitHub Release
        run: |
          set -e
          INPUT_TAG="${{ github.event.inputs.release_tag || '' }}"
          if [ -n "$INPUT_TAG" ]; then
            TAGS="$INPUT_TAG android-apk-v1.8.2"
          else
            LATEST_TAG=$(gh release list --limit 30 --json tagName,assets \
              --jq '.[] | select(any(.assets[]; .name | endswith(".apk"))) | .tagName' \
              2>/dev/null | head -1 || echo "")
            TAGS="${LATEST_TAG:-android-apk-v1.8.2} android-apk-v1.8.2"
          fi
          APK_OK=false
          for TAG in $TAGS; do
            [ -z "$TAG" ] && continue
            echo "Trying release tag: $TAG"
            if gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --pattern "*.apk" \
              --dir . \
              --clobber 2>/dev/null; then
              if [ -f Qatarat.Lambda-Stage.apk ]; then
                mv Qatarat.Lambda-Stage.apk "Qatarat (Lambda-Stage).apk"
              fi
              if [ -f "Qatarat (Lambda-Stage).apk" ]; then
                echo "✅ APK from release $TAG ($(du -sh 'Qatarat (Lambda-Stage).apk' | cut -f1))"
                APK_OK=true
                break
              fi
            fi
          done
          if [ "$APK_OK" = "false" ]; then
            echo "::error::Could not download APK from any release. Tags tried: $TAGS"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Regression Flows on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -e
            adb install -r "Qatarat (Lambda-Stage).apk"
            touch /tmp/android_rec_on
            mkdir -p /tmp/adb_segs
            bash testing/record_android.sh /tmp/adb_segs &
            REC_PID=$!
            set +e
            TEST_RC=0
            bash testing/run_regression_ci.sh "${{ github.event.inputs.flow }}" || TEST_RC=$?
            rm -f /tmp/android_rec_on
            pkill -INT -f 'screenrecord --time-limit' 2>/dev/null || true
            sleep 3
            kill "$REC_PID" 2>/dev/null || true
            wait "$REC_PID" 2>/dev/null || true
            exit $TEST_RC

      - name: Concat Android recording
        if: always()
        run: |
          if ls /tmp/adb_segs/seg_*.mp4 2>/dev/null | grep -q .; then
            find /tmp/adb_segs -name "seg_*.mp4" | sort -V | \
              awk '{print "file \x27" $0 "\x27"}' > /tmp/adb_segs/list.txt
            mkdir -p testing/maestro/reports
            ffmpeg -f concat -safe 0 -i /tmp/adb_segs/list.txt \
              -vf "scale=480:-2,setsar=1" -r 15 -crf 35 -preset fast \
              -movflags +faststart -y testing/maestro/reports/android-maestro.mp4 \
              2>&1 | tail -3 || true
            echo "Recording: $(du -sh testing/maestro/reports/android-maestro.mp4 2>/dev/null || echo 'failed')"
          else
            echo "No recording segments — nothing to concat"
          fi

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, glob
          xmls = glob.glob("testing/maestro/reports/*-results.xml")
          total = passed = failed = 0
          rows = ""
          for xml_path in sorted(xmls):
              try:
                  root = ET.parse(xml_path).getroot()
                  suites = root.findall(".//testsuite") or [root]
                  for ts in suites:
                      for tc in ts.findall("testcase"):
                          total += 1
                          name = tc.get("name", os.path.basename(xml_path).replace("-results.xml",""))
                          if tc.find("failure") is not None or tc.find("error") is not None:
                              failed += 1; icon = "❌"
                          else:
                              passed += 1; icon = "✅"
                          rows += f"| {icon} | {name} |\n"
              except Exception as e:
                  print(f"Warning: {xml_path}: {e}")
          pct = int(passed/total*100) if total else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 🧪 Maestro Regression Results
          {bar}
          | Metric | Value |
          |--------|-------|
          | ✅ Passed | {passed} |
          | ❌ Failed | {failed} |
          | 📊 Total  | {total} |
          | 📈 Pass rate | {pct}% |

          ### Test Details
          | Status | Flow |
          |--------|------|
          {rows}"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          EOF

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-regression-junit-${{ github.run_number }}
          path: testing/maestro/reports/*.xml
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-regression-screenshots-${{ github.run_number }}
          path: testing/maestro/reports/*.png
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Android Maestro recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-maestro-recording-${{ github.run_number }}
          path: testing/maestro/reports/android-maestro.mp4
          retention-days: 7
          if-no-files-found: warn

      - name: Open GitHub Issue on nightly failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI] Nightly regression failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Maestro regression failed on run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`,
              labels: ['ci-failure']
            })
