name: "Publish Test Report → GitHub Pages"

on:
  workflow_run:
    workflows:
      - "Maestro — Smoke (Android)"
      - "Maestro — Full Regression (Android)"
      - "Appium — Deep Tests (Android)"
      - "Maestro — Smoke & Regression (iOS Simulator)"
      - "Appium — Deep Tests (iOS Simulator)"
    types: [completed]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-report:
    name: Generate & Deploy Report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate report inventory
        run: python3 testing/validate_report_inventory.py

      # Resolve smoke and full-regression artifacts independently. A single
      # manual regression flow must not replace the published full suite.
      - name: Resolve Android Maestro source run IDs
        id: maestro-runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pick_run() {
            local wf="$1"
            local filter="$2"
            gh api "repos/${{ github.repository }}/actions/workflows/${wf}/runs?per_page=30" \
              --jq "[.workflow_runs[] | select(.status == \"completed\" and .conclusion != \"cancelled\" and (${filter}))] | first | .id // empty" \
              2>/dev/null || true
          }

          SMOKE_ID=$(pick_run "01-maestro-smoke.yml" "true")
          REGRESSION_ID=$(pick_run "02-maestro-regression.yml" '.event != "workflow_dispatch"')

          if [ "${{ github.event_name }}" = "workflow_run" ] && \
             [ "${{ github.event.workflow_run.name }}" = "Maestro — Smoke (Android)" ] && \
             [ "${{ github.event.workflow_run.conclusion }}" != "cancelled" ]; then
            SMOKE_ID="${{ github.event.workflow_run.id }}"
          fi

          if [ "${{ github.event_name }}" = "workflow_run" ] && \
             [ "${{ github.event.workflow_run.name }}" = "Maestro — Full Regression (Android)" ] && \
             [ "${{ github.event.workflow_run.event }}" != "workflow_dispatch" ] && \
             [ "${{ github.event.workflow_run.conclusion }}" != "cancelled" ]; then
            REGRESSION_ID="${{ github.event.workflow_run.id }}"
          fi

          echo "smoke_id=${SMOKE_ID}" >> "$GITHUB_OUTPUT"
          echo "regression_id=${REGRESSION_ID}" >> "$GITHUB_OUTPUT"
          echo "Latest Android Maestro smoke run ID: ${SMOKE_ID:-none found}"
          echo "Latest Android Maestro full regression run ID: ${REGRESSION_ID:-none found}"

      # Separately resolve the latest Android Appium run — it runs on a different schedule
      - name: Resolve Appium source run ID
        id: appium-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] && \
             echo "${{ github.event.workflow_run.name }}" | grep -qi "appium" && \
             echo "${{ github.event.workflow_run.name }}" | grep -qvi "ios" && \
             [ "${{ github.event.workflow_run.conclusion }}" != "cancelled" ]; then
            echo "id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "Triggered by Android Appium workflow_run: ${{ github.event.workflow_run.id }}"
          else
            echo "Searching for latest Android Appium run..."
            ID=$(gh api "repos/${{ github.repository }}/actions/workflows/03-appium-android.yml/runs?per_page=20" \
              --jq '[.workflow_runs[] | select(.status == "completed" and .conclusion != "cancelled")] | first | .id // empty' 2>/dev/null || echo "")
            echo "id=${ID}" >> "$GITHUB_OUTPUT"
            echo "Latest Android Appium run ID: ${ID:-none found}"
          fi

      # Resolve iOS Maestro run (Maestro iOS Simulator workflow)
      - name: Resolve Maestro iOS source run ID
        id: maestro-ios-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] && \
             echo "${{ github.event.workflow_run.name }}" | grep -qi "maestro" && \
             echo "${{ github.event.workflow_run.name }}" | grep -qi "ios" && \
             [ "${{ github.event.workflow_run.conclusion }}" != "cancelled" ]; then
            echo "id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "Triggered by Maestro iOS workflow_run: ${{ github.event.workflow_run.id }}"
          else
            ID=$(gh api "repos/${{ github.repository }}/actions/workflows/04-maestro-ios.yml/runs?per_page=20" \
              --jq '[.workflow_runs[] | select(.status == "completed" and .conclusion != "cancelled")] | first | .id // empty' 2>/dev/null || echo "")
            echo "id=${ID}" >> "$GITHUB_OUTPUT"
            echo "Latest Maestro iOS run ID: ${ID:-none found}"
          fi

      # Resolve iOS Appium run (Appium Deep Tests iOS Simulator workflow)
      - name: Resolve Appium iOS source run ID
        id: appium-ios-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] && \
             echo "${{ github.event.workflow_run.name }}" | grep -qi "appium" && \
             echo "${{ github.event.workflow_run.name }}" | grep -qi "ios" && \
             [ "${{ github.event.workflow_run.conclusion }}" != "cancelled" ]; then
            echo "id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "Triggered by Appium iOS workflow_run: ${{ github.event.workflow_run.id }}"
          else
            # Never select an in-progress matrix run. Its artifacts are incomplete
            # and would replace previously valid iOS data with a pending dashboard.
            ID=$(gh api "repos/${{ github.repository }}/actions/workflows/06-appium-ios.yml/runs?per_page=20" \
              --jq '[.workflow_runs[] | select(.status == "completed" and .conclusion != "cancelled")] | first | .id // empty' 2>/dev/null || echo "")
            echo "id=${ID}" >> "$GITHUB_OUTPUT"
            echo "Latest completed Appium iOS run ID: ${ID:-none found}"
          fi

      - name: Install Allure CLI
        run: |
          wget -qO allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxf allure.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      # ── Maestro artifacts (flow XMLs + screenshots) ──────────────────
      - name: Download Android Maestro Smoke JUnit XMLs
        if: steps.maestro-runs.outputs.smoke_id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.maestro-runs.outputs.smoke_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-artifacts/maestro/
          pattern: "maestro-smoke-junit*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Android Maestro Regression JUnit XMLs
        if: steps.maestro-runs.outputs.regression_id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.maestro-runs.outputs.regression_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-artifacts/maestro/
          pattern: "maestro-regression-junit*"
          merge-multiple: true
        continue-on-error: true

      - name: Download iOS Maestro JUnit XMLs
        if: steps.maestro-ios-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.maestro-ios-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-artifacts/maestro-ios/
          pattern: "maestro-ios-junit*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Android Maestro Smoke screenshots
        if: steps.maestro-runs.outputs.smoke_id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.maestro-runs.outputs.smoke_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-screenshots/
          pattern: "maestro-smoke-screenshots*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Android Maestro Regression screenshots
        if: steps.maestro-runs.outputs.regression_id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.maestro-runs.outputs.regression_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-screenshots/
          pattern: "maestro-regression-screenshots*"
          merge-multiple: true
        continue-on-error: true

      - name: Download iOS Maestro screenshots
        if: steps.maestro-ios-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.maestro-ios-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-screenshots/
          pattern: "maestro-ios-screenshots*"
          merge-multiple: true
        continue-on-error: true

      # ── Appium artifacts (JUnit + Allure + screenshots) — separate run ─
      - name: Download Appium JUnit XML
        if: steps.appium-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.appium-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-artifacts/appium/
          pattern: "appium-junit*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Appium Allure results
        if: steps.appium-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.appium-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: allure-results/
          pattern: "appium-allure-results-*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Appium Android screenshots
        if: steps.appium-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.appium-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-screenshots/
          pattern: "appium-screenshots-*"
          merge-multiple: true
        continue-on-error: true

      # ── iOS Appium artifacts ──────────────────────────────────────────────
      - name: Download Appium iOS JUnit XML
        if: steps.appium-ios-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.appium-ios-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-artifacts/appium-ios/
          pattern: "appium-ios-junit*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Appium iOS Allure results
        if: steps.appium-ios-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.appium-ios-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: allure-results/
          pattern: "appium-ios-allure-*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Appium iOS screenshots
        if: steps.appium-ios-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.appium-ios-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-screenshots/
          pattern: "appium-ios-screenshots-*"
          merge-multiple: true
        continue-on-error: true

      # ── Recording videos ─────────────────────────────────────────────────────
      - name: Download Android Appium recording
        if: steps.appium-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.appium-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-recordings/
          pattern: "android-appium-recording-*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Android Maestro Smoke recording
        if: steps.maestro-runs.outputs.smoke_id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.maestro-runs.outputs.smoke_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-recordings/
          pattern: "android-maestro-recording-*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Android Maestro Regression recording
        if: steps.maestro-runs.outputs.regression_id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.maestro-runs.outputs.regression_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-recordings/
          pattern: "android-maestro-recording-*"
          merge-multiple: true
        continue-on-error: true

      - name: Download iOS Appium recording
        if: steps.appium-ios-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.appium-ios-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-recordings/
          pattern: "ios-appium-recording-*"
          merge-multiple: true
        continue-on-error: true

      - name: Download iOS Maestro recording
        if: steps.maestro-ios-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.maestro-ios-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-recordings/
          pattern: "ios-maestro-recording-*"
          merge-multiple: true
        continue-on-error: true

      - name: Show downloaded artifacts
        run: |
          echo "=== raw-artifacts/ ==="
          find raw-artifacts/ -type f 2>/dev/null | head -20 || echo "(none)"
          echo "=== raw-screenshots/ ==="
          find raw-screenshots/ -type f 2>/dev/null | wc -l || echo "0"

      - name: Flatten JUnit XMLs into allure-results
        run: |
          mkdir -p allure-results
          find raw-artifacts/ -name "*.xml" -exec cp {} allure-results/ \; 2>/dev/null || true
          echo "JUnit files in allure-results: $(ls allure-results/*.xml 2>/dev/null | wc -l)"

      - name: Fetch previous Allure history
        run: |
          # Pull history from the previously deployed gh-pages so trend graphs persist
          mkdir -p allure-results/history
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"
          REPO="${REPO##*/}"
          BASE="https://${OWNER}.github.io/${REPO}/allure-report/history"
          for f in categories.json environment.json history.json history-trend.json; do
            curl -sf "${BASE}/${f}" -o "allure-results/history/${f}" 2>/dev/null \
              && echo "  fetched ${f}" || echo "  ${f} not available yet (first run?)"
          done

      - name: Generate Allure HTML report
        run: |
          mkdir -p allure-report
          if ls allure-results/*.xml allure-results/*.json 2>/dev/null | grep -q .; then
            allure generate allure-results/ --clean -o allure-report/
          else
            echo "No allure results — skipping"
          fi

      - name: Flatten screenshots into gh-pages/screenshots/
        run: |
          mkdir -p gh-pages/screenshots
          find raw-screenshots/ -name "*.png" -exec cp {} gh-pages/screenshots/ \; 2>/dev/null || true
          echo "Screenshots copied: $(ls gh-pages/screenshots/*.png 2>/dev/null | wc -l)"

      - name: Copy recordings to gh-pages/videos/
        run: |
          mkdir -p gh-pages/videos
          find raw-recordings/ -name "*.mp4" -exec cp {} gh-pages/videos/ \; 2>/dev/null || true
          first_video() {
            find raw-recordings/ -name "$1" -type f 2>/dev/null | sort -V | tail -1
          }
          for spec in \
            "android-appium-*.mp4:android-appium.mp4" \
            "android-maestro*.mp4:android-maestro.mp4" \
            "ios-appium*.mp4:ios-appium.mp4" \
            "ios-maestro*.mp4:ios-maestro.mp4"; do
            pattern="${spec%%:*}"
            target="${spec##*:}"
            src="$(first_video "$pattern")"
            if [ -n "$src" ]; then
              cp "$src" "gh-pages/videos/$target"
            fi
          done
          echo "Videos: $(ls gh-pages/videos/*.mp4 2>/dev/null | wc -l) file(s)"
          ls -lh gh-pages/videos/*.mp4 2>/dev/null || echo "(none yet)"

      - name: Append run to history log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_STARTED_AT: ${{ github.event.head_commit.timestamp || github.event.workflow_run.updated_at || '' }}
        run: |
          # Fetch previous run-history.json from gh-pages (if exists)
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"
          REPO="${REPO##*/}"
          curl -sf "https://${OWNER}.github.io/${REPO}/run-history.json" \
            -o gh-pages/run-history.json 2>/dev/null || echo "[]" > gh-pages/run-history.json

          python3 - <<'EOF'
          import json, os, glob, xml.etree.ElementTree as ET

          # Aggregate results from all XMLs in this run
          def is_infra_skip(raw):
              r = (raw or "").lower()
              return any(p in r for p in [
                  "android-only test", "failed on setup", "timeout >",
                  "cannot connect to appium server", "connection refused", "could not connect",
                  "webdriveragent", "wda", "xcuitest", "no such session", "invalid session id",
                  "simulator not found", "simulator may not be booted",
                  "appium session startup timed out", "ios simulator build required",
                  "architecture mismatch",
              ])

          total = passed = failed = skipped = 0
          xmls = glob.glob("raw-artifacts/**/*.xml", recursive=True)
          for xml_path in xmls:
              try:
                  root = ET.parse(xml_path).getroot()
                  for tc in root.iter("testcase"):
                      total += 1
                      failure_el = tc.find("failure")
                      fail_el = failure_el if failure_el is not None else tc.find("error")
                      if fail_el is not None:
                          raw = (fail_el.get("message") or "") or (fail_el.text or "")
                          if is_infra_skip(raw):
                              skipped += 1
                          else:
                              failed += 1
                      elif tc.find("skipped") is not None:
                          skipped += 1
                      else:
                          passed += 1
              except Exception:
                  pass

          entry = {
              "run_number": int(os.environ.get("GITHUB_RUN_NUMBER", 0)),
              "run_id":     os.environ.get("GITHUB_RUN_ID", ""),
              "sha":        os.environ.get("GITHUB_SHA", "")[:7],
              "date":       os.environ.get("GITHUB_RUN_STARTED_AT", ""),
              "total":      total,
              "passed":     passed,
              "failed":     failed,
              "skipped":    skipped,
              "pass_rate":  round(passed / (passed + failed) * 100, 1) if (passed + failed) else 0,
          }

          history_file = "gh-pages/run-history.json"
          history = json.loads(open(history_file).read()) if os.path.exists(history_file) else []
          history.append(entry)
          history = history[-50:]          # keep last 50 runs
          open(history_file, "w").write(json.dumps(history, indent=2))
          print(f"Run #{entry['run_number']}: {passed}/{total} passed, {failed} failed, {skipped} skipped ({entry['pass_rate']}%)")
          EOF

      - name: Generate data.js from real test results
        run: |
          python3 testing/generate_data_js.py \
            raw-artifacts/ \
            gh-pages/data.js \
            gh-pages/screenshots/ \
            gh-pages/run-history.json

      - name: Copy self-contained dashboard to gh-pages
        run: |
          mkdir -p gh-pages
          cp docs/index.html gh-pages/index.html
          cp docs/.nojekyll  gh-pages/.nojekyll 2>/dev/null || touch gh-pages/.nojekyll
          python3 - <<'EOF'
          from pathlib import Path
          path = Path("gh-pages/index.html")
          html = path.read_text()
          html = html.replace("__REPORT_DATA_VERSION__", "${{ github.run_id }}-${{ github.sha }}")
          path.write_text(html)
          EOF

      - name: Verify generated dashboard payload
        run: |
          test -s gh-pages/data.js
          grep -q "window.QATARAT_LIVE = LIVE_DATA" gh-pages/data.js
          if grep -q "QATARAT_LIVE = null" gh-pages/data.js; then
            echo "Generated dashboard payload is null; refusing to publish empty report."
            exit 1
          fi
          python3 - <<'EOF'
          from pathlib import Path
          data = Path("gh-pages/data.js").read_text()
          index = Path("gh-pages/index.html").read_text()
          if "__REPORT_DATA_VERSION__" in index:
              raise SystemExit("Dashboard data cache buster was not replaced")
          required_sections = ["testResults:", "iosTestResults:", "maestroStatuses:", "currentRun:"]
          missing = [section for section in required_sections if section not in data]
          if missing:
              raise SystemExit(f"Dashboard payload is missing expected result sections: {missing}")
          print("Dashboard payload verified")
          EOF

      - name: Copy Allure report
        run: cp -r allure-report/ gh-pages/allure-report/ 2>/dev/null || mkdir -p gh-pages/allure-report

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, glob
          xmls = glob.glob("raw-artifacts/**/*.xml", recursive=True)
          def is_infra_skip(raw):
              r = (raw or "").lower()
              return any(p in r for p in [
                  "android-only test", "failed on setup", "timeout >",
                  "cannot connect to appium server", "connection refused", "could not connect",
                  "webdriveragent", "wda", "xcuitest", "no such session", "invalid session id",
                  "simulator not found", "simulator may not be booted",
                  "appium session startup timed out", "ios simulator build required",
                  "architecture mismatch",
              ])

          total = passed = failed = skipped = 0
          rows = ""
          for xml_path in sorted(xmls):
              try:
                  root = ET.parse(xml_path).getroot()
                  for tc in root.iter("testcase"):
                      total += 1
                      name = tc.get("name", os.path.basename(xml_path).replace(".xml",""))
                      failure_el = tc.find("failure")
                      fail_el = failure_el if failure_el is not None else tc.find("error")
                      if fail_el is not None:
                          raw = (fail_el.get("message") or "") or (fail_el.text or "")
                          if is_infra_skip(raw):
                              skipped += 1; icon = "⏭️"
                          else:
                              failed += 1; icon = "❌"
                      elif tc.find("skipped") is not None:
                          skipped += 1; icon = "⏭️"
                      else:
                          passed += 1; icon = "✅"
                      rows += f"| {icon} | {name} |\n"
              except Exception as e:
                  print(f"Warning: {xml_path}: {e}")
          executed = passed + failed
          pct = int(passed/executed*100) if executed else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)

          # Load run history for trend table
          import json
          history_rows = ""
          try:
              history = json.loads(open("gh-pages/run-history.json").read())
              for r in reversed(history[-10:]):   # last 10 runs, newest first
                  icon = "🟢" if r["failed"] == 0 else "🔴"
                  history_rows += (
                      f"| {icon} #{r['run_number']} | {r.get('date','')[:10]} | "
                      f"{r['passed']}/{r['total']} | {r['pass_rate']}% |\n"
                  )
          except Exception:
              history_rows = "| — | No history yet |\n"

          summary = f"""## 📊 Qatarat Test Report — Run #${{ github.run_number }}
          {bar}
          | Metric | Value |
          |--------|-------|
          | ✅ Passed  | {passed} |
          | ❌ Failed  | {failed} |
          | ⏭️ Skipped | {skipped} |
          | 📊 Total   | {total} |
          | 📈 Pass rate | {pct}% |

          ### 📅 Run History (last 10)
          | Run | Date | Passed/Total | Rate |
          |-----|------|-------------|------|
          {history_rows}

          ### Test Details
          | Status | Test |
          |--------|------|
          {rows if rows else "| — | No results yet — trigger a workflow to populate |\n"}"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          EOF

      - name: Wait for legacy docs Pages deployment
        run: |
          echo "Waiting for the repository /docs Pages deployment to finish before publishing generated data..."
          sleep 180

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
