name: "Publish Test Report → GitHub Pages"

on:
  workflow_run:
    workflows:
      - "Maestro — Smoke (Android)"
      - "Maestro — Full Regression (Android)"
      - "Appium — Deep Tests (Android)"
    types: [completed]
  push:
    branches: [main]
    paths:
      - "testing/report-ui/**"
      - "testing/generate_data_js.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-report:
    name: Generate & Deploy Report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Resolve which run's artifacts to download:
      #   workflow_run  → use the triggering run's ID (has the test XMLs/screenshots)
      #   push / dispatch → find the most recent successful smoke or regression run
      - name: Resolve artifact source run ID
        id: source-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "Triggered by workflow_run: using run ${{ github.event.workflow_run.id }}"
          else
            echo "Triggered by ${{ github.event_name }}: searching for latest test run"
            ID=$(gh api "repos/${{ github.repository }}/actions/runs?status=success&per_page=30" \
              --jq '[.workflow_runs[] | select(.name | test("Maestro|Appium"))] | first | .id // ""' 2>/dev/null || echo "")
            echo "id=${ID}" >> "$GITHUB_OUTPUT"
            echo "Latest test run ID: ${ID:-none found}"
          fi

      - name: Install Allure CLI
        run: |
          wget -qO allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxf allure.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Download JUnit XML artifacts
        if: steps.source-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.source-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-artifacts/
          pattern: "*junit*"
          merge-multiple: false
        continue-on-error: true

      - name: Download Appium Allure results
        if: steps.source-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.source-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: allure-results/
          pattern: "appium-allure-results-*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Maestro screenshots
        if: steps.source-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.source-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-screenshots/
          pattern: "maestro-*-screenshots-*"
          merge-multiple: true
        continue-on-error: true

      - name: Download Appium screenshots
        if: steps.source-run.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.source-run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: raw-screenshots/
          pattern: "appium-screenshots-*"
          merge-multiple: true
        continue-on-error: true

      - name: Show downloaded artifacts
        run: |
          echo "=== raw-artifacts/ ==="
          find raw-artifacts/ -type f 2>/dev/null | head -20 || echo "(none)"
          echo "=== raw-screenshots/ ==="
          find raw-screenshots/ -type f 2>/dev/null | wc -l || echo "0"

      - name: Flatten JUnit XMLs into allure-results
        run: |
          mkdir -p allure-results
          find raw-artifacts/ -name "*.xml" -exec cp {} allure-results/ \; 2>/dev/null || true
          echo "JUnit files in allure-results: $(ls allure-results/*.xml 2>/dev/null | wc -l)"

      - name: Generate Allure HTML report
        run: |
          mkdir -p allure-report
          if [ "$(ls -A allure-results/*.xml 2>/dev/null)" ]; then
            allure generate allure-results/ --clean -o allure-report/
          else
            echo "No allure results — skipping"
          fi

      - name: Flatten screenshots into gh-pages/screenshots/
        run: |
          mkdir -p gh-pages/screenshots
          find raw-screenshots/ -name "*.png" -exec cp {} gh-pages/screenshots/ \; 2>/dev/null || true
          echo "Screenshots copied: $(ls gh-pages/screenshots/*.png 2>/dev/null | wc -l)"

      - name: Generate data.js from real test results
        run: |
          python3 testing/generate_data_js.py \
            raw-artifacts/ \
            gh-pages/data.js \
            gh-pages/screenshots/

      - name: Copy React dashboard to gh-pages
        run: |
          mkdir -p gh-pages/views
          cp testing/report-ui/index.html       gh-pages/index.html
          cp testing/report-ui/ui.jsx           gh-pages/ui.jsx
          cp testing/report-ui/tweaks-panel.jsx gh-pages/tweaks-panel.jsx
          cp testing/report-ui/app.jsx          gh-pages/app.jsx
          cp testing/report-ui/views/*.jsx      gh-pages/views/

      - name: Copy Allure report
        run: cp -r allure-report/ gh-pages/allure-report/ 2>/dev/null || mkdir -p gh-pages/allure-report

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, glob
          xmls = glob.glob("raw-artifacts/**/*.xml", recursive=True)
          total = passed = failed = skipped = 0
          rows = ""
          for xml_path in sorted(xmls):
              try:
                  root = ET.parse(xml_path).getroot()
                  for tc in root.iter("testcase"):
                      total += 1
                      name = tc.get("name", os.path.basename(xml_path).replace(".xml",""))
                      if tc.find("failure") is not None or tc.find("error") is not None:
                          failed += 1; icon = "❌"
                      elif tc.find("skipped") is not None:
                          skipped += 1; icon = "⏭️"
                      else:
                          passed += 1; icon = "✅"
                      rows += f"| {icon} | {name} |\n"
              except Exception as e:
                  print(f"Warning: {xml_path}: {e}")
          pct = int(passed/total*100) if total else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 📊 Qatarat Test Report
          {bar}
          | Metric | Value |
          |--------|-------|
          | ✅ Passed  | {passed} |
          | ❌ Failed  | {failed} |
          | ⏭️ Skipped | {skipped} |
          | 📊 Total   | {total} |
          | 📈 Pass rate | {pct}% |

          ### Test Details
          | Status | Test |
          |--------|------|
          {rows if rows else "| — | No results yet — trigger a workflow to populate |\n"}"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          EOF

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
