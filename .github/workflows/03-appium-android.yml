name: "Appium — Deep Tests (Android)"

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      marker:
        description: "pytest marker (payment | gift | subscription | account | streaming | empty=all). Defaults to 'account' if blank."
        required: false
        default: "account"

concurrency:
  group: appium-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appium-tests:
    name: Appium Deep Tests (Android API 33)
    runs-on: ubuntu-latest
    # emulator boot ~20-40 min + 27 account tests ~4-5 min each on CI = ~130-175 min
    # Use 240 for all — same headroom regardless of trigger
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Download APK from GitHub Release
        run: |
          set -e
          LATEST_TAG=$(gh release list --limit 30 --json tagName,assets \
            --jq '.[] | select(any(.assets[]; .name | endswith(".apk"))) | .tagName' \
            2>/dev/null | head -1 || echo "")
          TAGS="${LATEST_TAG:-android-apk-v1.8.2} android-apk-v1.8.2"
          APK_OK=false
          for TAG in $TAGS; do
            [ -z "$TAG" ] && continue
            echo "Trying release tag: $TAG"
            if gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --pattern "*.apk" \
              --dir . \
              --clobber 2>/dev/null; then
              if [ -f Qatarat.Lambda-Stage.apk ]; then
                mv Qatarat.Lambda-Stage.apk "Qatarat (Lambda-Stage).apk"
              fi
              if [ -f "Qatarat (Lambda-Stage).apk" ]; then
                echo "✅ APK from release $TAG ($(du -sh 'Qatarat (Lambda-Stage).apk' | cut -f1))"
                APK_OK=true
                break
              fi
            fi
          done
          if [ "$APK_OK" = "false" ]; then
            echo "::error::Could not download APK from any release. Tags tried: $TAGS"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: testing/appium/requirements.txt

      - name: Install Python deps
        run: pip install -r testing/appium/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium + drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Pre-install Android system image
        run: |
          # API 29 default is ~half the size of API 33 google_apis and boots
          # in 3-5 min with KVM — API 33 google_apis was timing out at 4h.
          SDKMAN="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMAN" ]; then
            echo "::warning::sdkmanager not found — emulator runner will install"
            exit 0
          fi
          "$SDKMAN" --install 'system-images;android-29;google_apis;x86_64' 2>&1 | tail -5 || true
          echo "✅ system-images;android-29;google_apis;x86_64 ready"

      - name: Start Appium server
        run: |
          appium --port 4723 --log /tmp/appium.log --log-level warn &
          for i in $(seq 1 20); do
            sleep 2
            if curl -sf http://localhost:4723/status | python3 -c \
              "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('value',{}).get('ready') else 1)" 2>/dev/null; then
              echo "✅ Appium ready after $((i*2))s"
              exit 0
            fi
            echo "Waiting for Appium... ($i/20)"
          done
          echo "::error::Appium failed to start within 40s"
          cat /tmp/appium.log | tail -20
          exit 1

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          PLATFORM: android
          DEVICE_MODE: emulator
          TEST_MARKER: ${{ github.event.inputs.marker || 'account' }}
          ANDROID_EMU_NAME: Pixel_4_API_29
          ANDROID_AVD: Pixel_4_API_29
          ANDROID_VERSION: "10"
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_4
          target: google_apis
          avd-name: Pixel_4_API_29
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 3072
          disable-animations: true
          script: |
            # recording removed — screenrecord on emulator hangs wait() indefinitely,
            # causing the entire script to block after tests complete and losing all results
            set -e
            echo "=== Waiting for device ==="
            adb wait-for-device
            echo "=== Installing APK ==="
            timeout 120 adb install -r "Qatarat (Lambda-Stage).apk" || { echo "::error::adb install failed"; exit 1; }
            echo "=== APK installed — running tests ==="
            set +e
            bash testing/run_appium_ci.sh "$TEST_MARKER"
            exit $?

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, pathlib
          f = "testing/appium/reports/results.xml"
          if not pathlib.Path(f).exists():
              print("No results file found"); exit()
          root = ET.parse(f).getroot()
          suites = root.findall(".//testsuite") or [root]
          total = passed = failed = skipped = 0
          rows = ""
          for ts in suites:
              for tc in ts.findall("testcase"):
                  total += 1
                  name = tc.get("name","")
                  if tc.find("failure") is not None or tc.find("error") is not None:
                      failed += 1; icon = "❌"
                  elif tc.find("skipped") is not None:
                      skipped += 1; icon = "⏭️"
                  else:
                      passed += 1; icon = "✅"
                  rows += f"| {icon} | {name} |\n"
          pct = int(passed/total*100) if total else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 🤖 Appium Deep Test Results
          {bar}
          | Metric | Value |
          |--------|-------|
          | ✅ Passed  | {passed} |
          | ❌ Failed  | {failed} |
          | ⏭️ Skipped | {skipped} |
          | 📊 Total   | {total} |
          | 📈 Pass rate | {pct}% |

          ### Test Details
          | Status | Test |
          |--------|------|
          {rows}"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          EOF

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-allure-results-${{ github.run_number }}
          path: testing/appium/allure-results/
          retention-days: 30

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-junit-${{ github.run_number }}
          path: testing/appium/reports/results.xml
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-html-report-${{ github.run_number }}
          path: testing/appium/reports/report.html
          retention-days: 30

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-screenshots-${{ github.run_number }}
          path: testing/appium/reports/screenshots/
          retention-days: 14

      - name: Upload Appium log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-server-log-${{ github.run_number }}
          path: /tmp/appium.log
          retention-days: 7

      - name: Upload Android recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-appium-recording-${{ github.run_number }}
          path: testing/appium/reports/android-appium.mp4
          retention-days: 7
          if-no-files-found: warn
