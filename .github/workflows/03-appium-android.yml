name: "Appium — Deep Tests (Android)"

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      marker:
        description: "pytest marker (payment | gift | subscription | account | streaming | empty=all)"
        required: false
        default: ""

concurrency:
  group: appium-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appium-tests:
    name: Appium Deep Tests (Android API 33)
    runs-on: ubuntu-latest
    # push runs account-marker subset — emulator setup ~15 min + 27 tests ~3 min each = ~96 min
    # schedule/dispatch runs full suite ~150 min
    timeout-minutes: ${{ github.event_name == 'push' && 100 || 150 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Download APK from GitHub Release
        run: |
          gh release download android-apk-v1.8.2 \
            --repo Qatarat/qatarat-automation \
            --pattern "*.apk" \
            --dir . \
            --clobber
          if [ -f Qatarat.Lambda-Stage.apk ]; then
            mv Qatarat.Lambda-Stage.apk "Qatarat (Lambda-Stage).apk"
          fi
          echo "✅ APK downloaded ($(du -sh 'Qatarat (Lambda-Stage).apk' | cut -f1))"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: testing/appium/requirements.txt

      - name: Install Python deps
        run: pip install -r testing/appium/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium + drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Pre-install Android system image (retry on corrupt download)
        run: |
          # android-emulator-runner installs this internally, but can fail with
          # "ZipFile unknown archive" on a transient bad download. Pre-installing
          # with retry here so the emulator runner finds it already present.
          #
          # sdkmanager is not on PATH at this stage — use the full ANDROID_SDK_ROOT path.
          SDKMAN="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}/cmdline-tools/latest/bin/sdkmanager"
          echo "sdkmanager path: $SDKMAN"
          if [ ! -f "$SDKMAN" ]; then
            echo "::warning::sdkmanager not found at $SDKMAN — skipping pre-install (emulator runner will install)"
            exit 0
          fi
          set +e
          for attempt in 1 2 3; do
            echo "SDK install attempt $attempt/3..."
            OUT=$("$SDKMAN" --install 'system-images;android-33;google_apis;x86_64' --channel=0 2>&1)
            RC=$?
            echo "$OUT"
            if [ $RC -eq 0 ] && ! echo "$OUT" | grep -qi "ZipFile\|unknown archive\|Error on"; then
              echo "✅ system-images;android-33;google_apis;x86_64 ready"
              exit 0
            fi
            [ "$attempt" -eq 3 ] && { echo "::error::SDK install failed after 3 attempts"; exit 1; }
            echo "Retrying in 20s..."
            sleep 20
          done

      - name: Start Appium server
        run: |
          appium --port 4723 --log /tmp/appium.log &
          sleep 5

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          PLATFORM: android
          DEVICE_MODE: emulator
          # Evaluate marker here (single-line expression) so the script field
          # never contains ${{ }} syntax that bash would misinterpret
          TEST_MARKER: ${{ github.event_name == 'push' && 'account' || github.event.inputs.marker || '' }}
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          avd-name: Pixel_7_API_33
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -e
            adb install -r "Qatarat (Lambda-Stage).apk"
            touch /tmp/android_rec_on
            mkdir -p /tmp/adb_segs
            bash testing/record_android.sh /tmp/adb_segs &
            REC_PID=$!
            set +e
            bash testing/run_appium_ci.sh "$TEST_MARKER"
            TEST_RC=$?
            rm -f /tmp/android_rec_on
            wait "$REC_PID" 2>/dev/null || true
            if ls /tmp/adb_segs/seg_*.mp4 2>/dev/null | grep -q .; then
              find /tmp/adb_segs -name "seg_*.mp4" | sort -V | awk '{print "file \x27" $0 "\x27"}' > /tmp/adb_segs/list.txt
              mkdir -p testing/appium/reports
              ffmpeg -f concat -safe 0 -i /tmp/adb_segs/list.txt \
                -vf "scale=480:-2,setsar=1" -r 15 -crf 35 -preset fast \
                -movflags +faststart -y testing/appium/reports/android-appium.mp4 2>&1 | tail -3 || true
              echo "Recording: $(du -sh testing/appium/reports/android-appium.mp4 2>/dev/null || echo 'n/a')"
            fi
            exit $TEST_RC

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, pathlib
          f = "testing/appium/reports/results.xml"
          if not pathlib.Path(f).exists():
              print("No results file found"); exit()
          root = ET.parse(f).getroot()
          suites = root.findall(".//testsuite") or [root]
          total = passed = failed = skipped = 0
          rows = ""
          for ts in suites:
              for tc in ts.findall("testcase"):
                  total += 1
                  name = tc.get("name","")
                  if tc.find("failure") is not None or tc.find("error") is not None:
                      failed += 1; icon = "❌"
                  elif tc.find("skipped") is not None:
                      skipped += 1; icon = "⏭️"
                  else:
                      passed += 1; icon = "✅"
                  rows += f"| {icon} | {name} |\n"
          pct = int(passed/total*100) if total else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 🤖 Appium Deep Test Results
          {bar}
          | Metric | Value |
          |--------|-------|
          | ✅ Passed  | {passed} |
          | ❌ Failed  | {failed} |
          | ⏭️ Skipped | {skipped} |
          | 📊 Total   | {total} |
          | 📈 Pass rate | {pct}% |

          ### Test Details
          | Status | Test |
          |--------|------|
          {rows}"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          EOF

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-allure-results-${{ github.run_number }}
          path: testing/appium/allure-results/
          retention-days: 30

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-junit-${{ github.run_number }}
          path: testing/appium/reports/results.xml
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-html-report-${{ github.run_number }}
          path: testing/appium/reports/report.html
          retention-days: 30

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-screenshots-${{ github.run_number }}
          path: testing/appium/reports/screenshots/
          retention-days: 14

      - name: Upload Appium log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-server-log-${{ github.run_number }}
          path: /tmp/appium.log
          retention-days: 7

      - name: Upload Android recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-appium-recording-${{ github.run_number }}
          path: testing/appium/reports/android-appium.mp4
          retention-days: 7
          if-no-files-found: warn
