name: "Appium — Deep Tests (Android)"

on:
  push:
    branches: [main, develop]
    paths:
      - "testing/appium/**"
      - ".github/workflows/03-appium-android.yml"
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      marker:
        description: "pytest marker to filter (leave blank = run ALL 252 tests across all groups)"
        required: false
        default: ""

concurrency:
  group: appium-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appium-tests:
    name: Android Appium — ${{ matrix.group.name }}
    runs-on: ubuntu-latest
    # Each group: ~60 tests × 3 min avg + 40 min emulator boot = ~220 min
    timeout-minutes: 240

    strategy:
      fail-fast: false   # one group failing must not cancel others
      matrix:
        group:
          - name: "auth-account"
            paths: "tests/auth/ tests/account/"
          - name: "payment-commerce"
            paths: "tests/payment/ tests/wallet/ tests/checkout/ tests/promo/"
          - name: "donation-commerce"
            paths: "tests/donation/ tests/gift/ tests/subscription/ tests/cart/"
          - name: "browse-misc"
            paths: "tests/browse/ tests/mosque/ tests/home/ tests/notifications/ tests/streaming/ tests/booking/ tests/orders/"
          - name: "new-features"
            paths: "tests/favourites/ tests/location/ tests/rating/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Download APK from GitHub Release
        run: |
          set -e
          LATEST_TAG=$(gh release list --limit 30 --json tagName,assets \
            --jq '.[] | select(any(.assets[]; .name | endswith(".apk"))) | .tagName' \
            2>/dev/null | head -1 || echo "")
          TAGS="${LATEST_TAG:-android-apk-v1.8.2} android-apk-v1.8.2"
          APK_OK=false
          for TAG in $TAGS; do
            [ -z "$TAG" ] && continue
            echo "Trying release tag: $TAG"
            if gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --pattern "*.apk" \
              --dir . \
              --clobber 2>/dev/null; then
              if [ -f Qatarat.Lambda-Stage.apk ]; then
                mv Qatarat.Lambda-Stage.apk "Qatarat (Lambda-Stage).apk"
              fi
              if [ -f "Qatarat (Lambda-Stage).apk" ]; then
                echo "✅ APK from release $TAG ($(du -sh 'Qatarat (Lambda-Stage).apk' | cut -f1))"
                APK_OK=true
                break
              fi
            fi
          done
          if [ "$APK_OK" = "false" ]; then
            echo "::error::Could not download APK from any release. Tags tried: $TAGS"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: testing/appium/requirements.txt

      - name: Install Python deps
        run: pip install -r testing/appium/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium + drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Pre-install Android system image
        run: |
          SDKMAN="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMAN" ]; then
            echo "::warning::sdkmanager not found — emulator runner will install"
            exit 0
          fi
          "$SDKMAN" --install 'system-images;android-29;google_apis;x86_64' 2>&1 | tail -5 || true
          echo "✅ system-images;android-29;google_apis;x86_64 ready"

      - name: Start Appium server
        run: |
          appium --port 4723 --log /tmp/appium.log --log-level warn &
          for i in $(seq 1 20); do
            sleep 2
            if curl -sf http://localhost:4723/status | python3 -c \
              "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('value',{}).get('ready') else 1)" 2>/dev/null; then
              echo "✅ Appium ready after $((i*2))s"
              exit 0
            fi
            echo "Waiting for Appium... ($i/20)"
          done
          echo "::error::Appium failed to start within 40s"
          tail -20 /tmp/appium.log
          exit 1

      - name: Run Appium Tests on Emulator — ${{ matrix.group.name }}
        uses: reactivecircus/android-emulator-runner@v2
        env:
          PLATFORM: android
          DEVICE_MODE: emulator
          TEST_MARKER: ${{ github.event.inputs.marker || '' }}
          TEST_PATHS: ${{ matrix.group.paths }}
          GROUP_NAME: ${{ matrix.group.name }}
          ANDROID_EMU_NAME: Pixel_4_API_29
          ANDROID_AVD: Pixel_4_API_29
          ANDROID_VERSION: "10"
          TEST_OTP: "1234"
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_4
          target: google_apis
          avd-name: Pixel_4_API_29
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 3072
          disable-animations: true
          script: |
            set -e
            echo "=== Waiting for device ==="
            adb wait-for-device
            echo "=== Installing APK ==="
            timeout 120 adb install -r "Qatarat (Lambda-Stage).apk" || { echo "::error::adb install failed"; exit 1; }
            echo "=== APK installed — running group: $GROUP_NAME | paths: $TEST_PATHS ==="
            mkdir -p testing/appium/reports
            REC_REMOTE="/sdcard/android-appium-${GROUP_NAME}.mp4"
            REC_LOCAL="testing/appium/reports/android-appium-${GROUP_NAME}.mp4"
            rm -f "$REC_LOCAL"
            adb shell rm -f "$REC_REMOTE" >/dev/null 2>&1 || true
            adb shell screenrecord --time-limit 180 "$REC_REMOTE" >/tmp/android-appium-screenrecord.log 2>&1 &
            REC_PID=$!
            set +e
            bash testing/run_appium_ci.sh
            RC=$?
            kill -INT "$REC_PID" >/dev/null 2>&1 || true
            wait "$REC_PID" >/dev/null 2>&1 || true
            sleep 2
            adb pull "$REC_REMOTE" "$REC_LOCAL" >/dev/null 2>&1 || true
            ls -lh "$REC_LOCAL" 2>/dev/null || echo "No Android Appium recording pulled"
            exit "$RC"

      - name: Publish step summary — ${{ matrix.group.name }}
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, pathlib, glob
          group = os.environ.get("GROUP_NAME", "")
          pat = f"testing/appium/reports/results-{group}.xml" if group else "testing/appium/reports/results.xml"
          files = glob.glob(pat) or glob.glob("testing/appium/reports/results*.xml")
          if not files:
              with open(os.environ.get("GITHUB_STEP_SUMMARY") or "/dev/null", "a") as fh:
                  fh.write(f"## 🤖 Android Appium — {group}\n\n> No results file — check logs.\n")
              exit(0)
          root = ET.parse(files[0]).getroot()
          def is_infra_skip(raw):
              r = (raw or "").lower()
              return any(p in r for p in [
                  "android-only test", "failed on setup", "timeout >",
                  "cannot connect to appium server", "connection refused", "could not connect",
                  "webdriveragent", "wda", "xcuitest", "no such session", "invalid session id",
                  "simulator not found", "simulator may not be booted",
                  "appium session startup timed out", "ios simulator build required",
                  "architecture mismatch",
              ])
          total = passed = failed = skipped = 0
          rows = ""
          for tc in root.iter("testcase"):
              total += 1
              name = tc.get("name", "")
              failure_el = tc.find("failure")
              el = failure_el if failure_el is not None else tc.find("error")
              if el is not None:
                  reason = ((el.get("message") or "") or (el.text or ""))[:100].replace("|","\\|")
                  if is_infra_skip(reason):
                      skipped += 1; icon = "⏭️"
                  else:
                      failed += 1; icon = "❌"
                  rows += f"| {icon} | {name} | {reason} |\n"
              elif tc.find("skipped") is not None:
                  skipped += 1
                  skip_el = tc.find("skipped")
                  reason = ((skip_el.get("message") or "") if skip_el is not None else "")[:100].replace("|","\\|")
                  rows += f"| ⏭️ | {name} | {reason} |\n"
              else:
                  passed += 1; icon = "✅"
                  rows += f"| {icon} | {name} |  |\n"
          executed = passed + failed
          pct = int(passed/executed*100) if executed else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 🤖 Android Appium — {group}: {passed}/{total} ({pct}%)
          {bar}
          | ✅ Passed | ❌ Failed | ⏭️ Skipped | 📊 Total |
          |----------|----------|-----------|---------|
          | {passed} | {failed} | {skipped} | {total} |

          | Status | Test | Reason |
          |--------|------|--------|
          {rows if rows else "| — | No test details |\n"}"""
          with open(os.environ.get("GITHUB_STEP_SUMMARY") or "/dev/null", "a") as fh:
              fh.write(summary)
          EOF
        env:
          GROUP_NAME: ${{ matrix.group.name }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-allure-results-${{ matrix.group.name }}-${{ github.run_number }}
          path: testing/appium/allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-junit-${{ matrix.group.name }}-${{ github.run_number }}
          path: testing/appium/reports/results-${{ matrix.group.name }}.xml
          retention-days: 30
          if-no-files-found: warn

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-html-report-${{ matrix.group.name }}-${{ github.run_number }}
          path: testing/appium/reports/report.html
          retention-days: 30
          if-no-files-found: warn

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-screenshots-${{ matrix.group.name }}-${{ github.run_number }}
          path: testing/appium/reports/screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Android Appium recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-appium-recording-${{ matrix.group.name }}-${{ github.run_number }}
          path: testing/appium/reports/android-appium-${{ matrix.group.name }}.mp4
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Appium log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-server-log-${{ matrix.group.name }}-${{ github.run_number }}
          path: /tmp/appium.log
          retention-days: 7
          if-no-files-found: warn
