name: "Maestro — Smoke & Regression (iOS Simulator)"

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run: smoke | regression | negative"
        required: false
        default: "regression"
      ios_version:
        description: "iOS simulator version"
        required: false
        default: "17"
      run_flows:
        description: "Execute unstable iOS Maestro simulator flows (true/false). Default false records flows as skipped."
        required: false
        default: "false"
      release_tag:
        description: "GitHub Release tag containing the IPA (leave blank to auto-detect latest)"
        required: false
        default: ""
  schedule:
    - cron: "0 3 * * 2"   # Every Tuesday 03:00 UTC — runs smoke (see suite resolution below)

concurrency:
  group: maestro-ios-${{ github.ref }}
  cancel-in-progress: true   # supersede stale queued/in-progress runs (macOS queue is slow)

jobs:
  ios-maestro:
    name: Maestro ${{ github.event.inputs.suite || (github.event_name == 'schedule' && 'smoke' || 'regression') }} — iOS Simulator
    runs-on: macos-15
    timeout-minutes: 300
    env:
      IOS_MAESTRO_RUN_FLOWS: ${{ github.event.inputs.run_flows || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Obtain IPA from GitHub Release
        if: ${{ env.IOS_MAESTRO_RUN_FLOWS == 'true' }}
        run: |
          set -e
          # Resolve which release tag to use:
          #   1. Workflow input (if provided)
          #   2. Auto-detect: latest release that has a .ipa asset
          #   3. Hard-coded fallback: ios-ipa-v1.8.2
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAGS="$INPUT_TAG ios-ipa-v1.8.2"
          else
            echo "Auto-detecting latest release with iOS IPA..."
            LATEST_TAG=$(gh release list --limit 30 --json tagName,assets \
              --jq '.[] | select(any(.assets[]; .name | endswith(".ipa"))) | .tagName' \
              2>/dev/null | head -1 || echo "")
            TAGS="${LATEST_TAG:-ios-ipa-v1.8.2} ios-ipa-v1.8.2"
          fi

          IPA_OK=false
          for TAG in $TAGS; do
            [ -z "$TAG" ] && continue
            echo "Trying release tag: $TAG"
            for attempt in 1 2 3; do
              if gh release download "$TAG" \
                --repo "${{ github.repository }}" \
                --pattern "qatarat-stage-ios.ipa" \
                --output qatarat-stage-ios.ipa \
                --clobber 2>/dev/null; then
                SIZE=$(stat -f%z qatarat-stage-ios.ipa 2>/dev/null || stat -c%s qatarat-stage-ios.ipa || echo 0)
                if [ "${SIZE:-0}" -ge 1000000 ]; then
                  echo "✅ IPA from release $TAG ($(du -sh qatarat-stage-ios.ipa | cut -f1))"
                  IPA_OK=true
                  break 2
                fi
                echo "File too small (${SIZE} bytes) — might be LFS pointer, trying next tag"
              fi
              [ "$attempt" -lt 3 ] && sleep 10
            done
          done

          if [ "$IPA_OK" = "false" ]; then
            echo "::error::Could not obtain a valid IPA from any release. Tags tried: $TAGS"
            echo "::error::Create a GitHub Release (e.g. ios-ipa-v1.8.3) and upload qatarat-stage-ios.ipa to it."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Java 17
        if: ${{ env.IOS_MAESTRO_RUN_FLOWS == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Maestro + ffmpeg
        if: ${{ env.IOS_MAESTRO_RUN_FLOWS == 'true' }}
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          brew install ffmpeg --quiet 2>/dev/null || true

      - name: Boot Simulator and install app
        if: ${{ env.IOS_MAESTRO_RUN_FLOWS == 'true' }}
        run: bash testing/ios_ci_setup.sh qatarat-stage-ios.ipa

      - name: Start iOS screen recording
        if: ${{ env.IOS_MAESTRO_RUN_FLOWS == 'true' }}
        run: |
          mkdir -p testing/maestro/reports
          xcrun simctl io "$SIM_ID" recordVideo \
            testing/maestro/reports/ios-maestro-raw.mp4 \
            --codec h264 &
          echo $! > /tmp/ios_rec_pid

      - name: Verify app can launch on Simulator
        if: ${{ env.IOS_MAESTRO_RUN_FLOWS == 'true' }}
        run: |
          xcrun simctl launch "$SIM_ID" com.qatarat.app 2>&1 | head -5 || true
          sleep 3
          xcrun simctl terminate "$SIM_ID" com.qatarat.app 2>/dev/null || true

      - name: Run Maestro Suite (per-flow JUnit)
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SUITE="smoke"
          else
            SUITE="${{ github.event.inputs.suite || 'regression' }}"
          fi
          echo "Running Maestro suite: $SUITE"
          bash testing/run_maestro_ios_ci.sh "$SUITE"

      - name: Stop and compress iOS recording
        if: always()
        run: |
          RPID=$(cat /tmp/ios_rec_pid 2>/dev/null || echo "")
          if [ -n "$RPID" ]; then
            kill -INT "$RPID" 2>/dev/null || true
            sleep 3
            wait "$RPID" 2>/dev/null || true
          fi
          RAW="testing/maestro/reports/ios-maestro-raw.mp4"
          OUT="testing/maestro/reports/ios-maestro.mp4"
          if [ -f "$RAW" ]; then
            ffmpeg -i "$RAW" \
              -vf "scale=480:-2,setsar=1" -r 15 -crf 35 -preset fast \
              -movflags +faststart -y "$OUT" 2>&1 | tail -3 || cp "$RAW" "$OUT"
            rm -f "$RAW"
          fi

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, glob
          xmls = glob.glob("testing/maestro/reports/*.xml")
          total = passed = failed = skipped = 0
          rows = ""
          for xml_path in sorted(xmls):
              try:
                  root = ET.parse(xml_path).getroot()
                  for tc in root.iter("testcase"):
                      total += 1
                      name = tc.get("name", os.path.basename(xml_path))
                      if tc.find("failure") is not None or tc.find("error") is not None:
                          failed += 1; icon = "❌"
                      elif tc.find("skipped") is not None:
                          skipped += 1; icon = "⏭️"
                      else:
                          passed += 1; icon = "✅"
                      rows += f"| {icon} | {name} |\n"
              except Exception as e:
                  print(f"Warning: {e}")
          pct = int(passed/total*100) if total else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 🍎 Maestro iOS Results
          {bar}
          | Metric | Value |
          |--------|-------|
          | ✅ Passed  | {passed} |
          | ❌ Failed  | {failed} |
          | ⏭️ Skipped | {skipped} |
          | 📊 Total   | {total} |
          | 📈 Pass rate | {pct}% |

          ### Test Details
          | Status | Test |
          |--------|------|
          {rows if rows else "| — | No results — check Maestro logs |\n"}"""
          with open(os.environ.get("GITHUB_STEP_SUMMARY") or "/dev/null", "a") as fh:
              fh.write(summary)
          EOF

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-junit-${{ github.event.inputs.suite || 'smoke' }}-${{ github.run_number }}
          path: testing/maestro/reports/
          retention-days: 30

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-screenshots-${{ github.run_number }}
          path: ~/.maestro/tests/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload iOS Maestro recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-recording-${{ github.run_number }}
          path: testing/maestro/reports/ios-maestro.mp4
          retention-days: 7
          if-no-files-found: warn
