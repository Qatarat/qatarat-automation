name: "Appium — Deep Tests (iOS Simulator)"

on:
  workflow_dispatch:
    inputs:
      marker:
        description: "pytest marker (donation | payment | mosque | wallet | account | streaming | empty=all)"
        required: false
        default: ""
      ios_version:
        description: "iOS simulator version override (leave blank to auto-detect from runner)"
        required: false
        default: ""
      record_video:
        description: "Record screen video (true/false) — disabled by default to prevent OOM"
        required: false
        default: "false"
  schedule:
    - cron: "0 12 * * *"  # Daily 12:00 UTC = 6:00 PM BDT (UTC+6)

concurrency:
  group: appium-ios-${{ github.ref }}
  cancel-in-progress: true   # supersede stale queued/in-progress runs (macOS queue is slow)

jobs:
  appium-ios:
    name: Appium Deep Tests (iOS Simulator)
    runs-on: macos-14
    # account suite ~60–90 min; full suite needs more headroom on Rosetta sim
    timeout-minutes: ${{ github.event.inputs.marker == '' && 240 || 180 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Download IPA from GitHub Release
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "Download attempt $attempt/3..."
            if gh release download ios-ipa-v1.8.2 \
              --repo Qatarat/qatarat-automation \
              --pattern "qatarat-stage-ios.ipa" \
              --output qatarat-stage-ios.ipa \
              --clobber; then
              break
            fi
            [ "$attempt" -eq 3 ] && { echo "::error::Failed to download IPA after 3 attempts"; exit 1; }
            sleep 10
          done
          SIZE=$(stat -f%z qatarat-stage-ios.ipa 2>/dev/null || stat -c%s qatarat-stage-ios.ipa)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "::error::Downloaded file too small ($SIZE bytes)"
            exit 1
          fi
          echo "✅ IPA downloaded ($(du -sh qatarat-stage-ios.ipa | cut -f1))"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: testing/appium/requirements.txt

      - name: Install Python deps
        run: pip install -r testing/appium/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium + XCUITest + Flutter drivers + ffmpeg
        run: |
          npm install -g appium
          appium driver install xcuitest
          appium driver install --source=npm appium-flutter-driver
          appium driver list --installed
          brew install ffmpeg --quiet 2>/dev/null || true

      - name: Boot Simulator and install app
        run: bash testing/ios_ci_setup.sh qatarat-stage-ios.ipa

      - name: Log system resources before tests
        run: |
          echo "=== Memory ===" && vm_stat | head -20
          echo "=== Disk ===" && df -h /
          echo "=== Processes ===" && top -l 1 -n 15 -o mem 2>/dev/null | head -25 || true

      - name: Start iOS screen recording (optional)
        if: ${{ github.event.inputs.record_video == 'true' }}
        run: |
          mkdir -p testing/appium/reports
          xcrun simctl io "$SIM_ID" recordVideo \
            testing/appium/reports/ios-appium-raw.mp4 \
            --codec h264 &
          echo $! > /tmp/ios_rec_pid
          echo "Screen recording started (PID $(cat /tmp/ios_rec_pid))"

      - name: Start Appium server
        run: |
          # Raise file descriptor limit — prevents EMFILE errors under heavy test load
          ulimit -n 65536 || true
          appium --port 4723 \
            --log /tmp/appium-ios.log \
            --log-level warn \
            --relaxed-security &
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://localhost:4723/status | python3 -c \
              "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('value',{}).get('ready') else 1)" 2>/dev/null; then
              echo "✅ Appium ready after $((i*2))s"
              exit 0
            fi
            echo "Waiting for Appium... ($i/30)"
          done
          echo "::error::Appium failed to start within 60s"
          cat /tmp/appium-ios.log | tail -30
          exit 1

      - name: Pre-warm WebDriverAgent (compile + launch WDA before tests)
        timeout-minutes: 12
        env:
          PLATFORM: ios
          DEVICE_MODE: simulator
          SIM_ID: ${{ env.SIM_ID }}
          IOS_APP_PATH: ${{ env.IOS_APP_PATH }}
          IOS_VERSION: ${{ env.IOS_VERSION || github.event.inputs.ios_version || '17.5' }}
          IOS_SIM_NAME: ${{ env.SIM_NAME }}
          APPIUM_SERVER: http://localhost:4723
        run: |
          # Create one Appium session that forces XCUITest to compile and install
          # WebDriverAgent on the simulator (takes 3-5 min cold). All subsequent
          # pytest sessions (useNewWDA: False) reuse the running WDA instance
          # and create in <10s instead of timing out at 120s.
          python3 - <<'PYEOF'
          import os, sys, time
          sys.path.insert(0, 'testing/appium')

          try:
              from appium.options import AppiumOptions
          except ImportError:
              try:
                  from appium.options.common.base import AppiumOptions
              except ImportError:
                  from appium.options.android.uiautomator2.base import UiAutomator2Options as AppiumOptions

          from appium import webdriver
          from capabilities.ios_caps import IOS_SIMULATOR_CAPS

          APPIUM_SERVER = os.environ.get("APPIUM_SERVER", "http://localhost:4723")

          caps = dict(IOS_SIMULATOR_CAPS)
          caps["appium:wdaLaunchTimeout"]       = 600000  # 10 min — enough for first build
          caps["appium:simulatorStartupTimeout"] = 60000  # sim already booted
          caps["appium:newCommandTimeout"]       = 60     # quit quickly after connect

          try:
              opts = AppiumOptions()
              opts.load_capabilities(caps)
          except Exception:
              opts = AppiumOptions()
              for k, v in caps.items():
                  opts.set_capability(k, v)

          print("Pre-warming WDA — first session compiles WebDriverAgent (~3-5 min)...")
          t0 = time.time()
          try:
              d = webdriver.Remote(APPIUM_SERVER, options=opts)
              print(f"WDA session ready in {time.time()-t0:.0f}s — quitting warmup session")
              d.quit()
              print("WDA pre-warm complete ✅")
          except Exception as e:
              print(f"WDA pre-warm failed after {time.time()-t0:.0f}s: {e}")
              print("Continuing — pytest will attempt sessions anyway")
          PYEOF

      - name: Run Appium Tests (iOS Simulator)
        id: run_tests
        # account suite = 27 tests × ~5 min each = ~135 min on slow macOS CI simulator
        # WDA pre-warm + setup adds ~20 min → total ~155 min needed
        timeout-minutes: 160
        env:
          PLATFORM: ios
          DEVICE_MODE: simulator
          SIM_ID: ${{ env.SIM_ID }}
          IOS_SIM_NAME: ${{ env.SIM_NAME }}
          IOS_VERSION: ${{ env.IOS_VERSION || github.event.inputs.ios_version || '17.5' }}
          IOS_APP_PATH: ${{ env.IOS_APP_PATH }}
          IOS_SIM_COMPATIBLE: ${{ env.IOS_SIM_COMPATIBLE }}
          APPIUM_SERVER: http://localhost:4723
          TEST_MARKER: ${{ github.event.inputs.marker || 'account' }}
          # Static OTP used by test backend (same as Android CI)
          TEST_OTP: "1234"
        run: |
          # Raise file descriptor limit for the test process
          ulimit -n 65536 || true
          bash testing/run_appium_ci.sh "$TEST_MARKER"

      - name: Log system resources after tests
        if: always()
        run: |
          echo "=== Memory after tests ===" && vm_stat | head -20 || true
          echo "=== Disk after tests ===" && df -h / || true

      - name: Stop and compress iOS recording
        if: always()
        run: |
          RPID=$(cat /tmp/ios_rec_pid 2>/dev/null || echo "")
          if [ -n "$RPID" ]; then
            kill -INT "$RPID" 2>/dev/null || true
            sleep 3
            wait "$RPID" 2>/dev/null || true
          fi
          RAW="testing/appium/reports/ios-appium-raw.mp4"
          OUT="testing/appium/reports/ios-appium.mp4"
          if [ -f "$RAW" ]; then
            ffmpeg -i "$RAW" \
              -vf "scale=480:-2,setsar=1" -r 15 -crf 35 -preset fast \
              -movflags +faststart -y "$OUT" 2>&1 | tail -3 || cp "$RAW" "$OUT"
            rm -f "$RAW"
          fi

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os, pathlib, textwrap
          f = "testing/appium/reports/results.xml"
          if not pathlib.Path(f).exists():
              with open(os.environ.get("GITHUB_STEP_SUMMARY") or "/dev/null", "a") as fh:
                  fh.write("## 🍎 Appium iOS\n\n> No results file — check logs.\n")
              exit(0)
          root = ET.parse(f).getroot()
          total = passed = failed = skipped = 0
          rows = ""
          for tc in root.iter("testcase"):
              total += 1
              name = tc.get("name", "")
              classname = tc.get("classname", "").split(".")[-1]
              if tc.find("failure") is not None or tc.find("error") is not None:
                  failed += 1; icon = "❌"
                  reason = ""
                  el = tc.find("failure") or tc.find("error")
                  if el is not None:
                      reason = (el.get("message") or "")[:120].replace("|", "\\|")
                  rows += f"| {icon} | `{classname}` | {name} | {reason} |\n"
              elif tc.find("skipped") is not None:
                  skipped += 1; icon = "⏭️"
                  el = tc.find("skipped")
                  reason = (el.get("message") or "")[:80].replace("|", "\\|") if el is not None else ""
                  rows += f"| {icon} | `{classname}` | {name} | {reason} |\n"
              else:
                  passed += 1; icon = "✅"
                  rows += f"| {icon} | `{classname}` | {name} |  |\n"
          pct = int(passed/total*100) if total else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 🍎 Appium iOS — {passed}/{total} passed ({pct}%)
          {bar}

          | Metric | Value |
          |--------|-------|
          | ✅ Passed  | {passed} |
          | ❌ Failed  | {failed} |
          | ⏭️ Skipped | {skipped} |
          | 📊 Total   | {total} |
          | 📈 Pass rate | {pct}% |

          ### Test Details
          | Status | Suite | Test | Reason |
          |--------|-------|------|--------|
          {rows}"""
          with open(os.environ.get("GITHUB_STEP_SUMMARY") or "/dev/null", "a") as fh:
              fh.write(textwrap.dedent(summary))
          PYEOF

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-ios-allure-${{ github.run_number }}
          path: testing/appium/allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-ios-junit-${{ github.run_number }}
          path: testing/appium/reports/results.xml
          retention-days: 30
          if-no-files-found: warn

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-ios-html-report-${{ github.run_number }}
          path: testing/appium/reports/report.html
          retention-days: 30
          if-no-files-found: warn

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-ios-screenshots-${{ github.run_number }}
          path: testing/appium/reports/screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Appium log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-ios-server-log-${{ github.run_number }}
          path: /tmp/appium-ios.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload iOS Appium recording
        if: ${{ github.event.inputs.record_video == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-appium-recording-${{ github.run_number }}
          path: testing/appium/reports/ios-appium.mp4
          retention-days: 7
          if-no-files-found: warn
