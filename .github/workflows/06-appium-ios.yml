name: "Appium — Deep Tests (iOS Simulator)"

on:
  workflow_dispatch:
    inputs:
      marker:
        description: "pytest marker to filter (leave blank = run ALL tests across all groups)"
        required: false
        default: ""
      ios_version:
        description: "iOS simulator version override (leave blank to auto-detect from runner)"
        required: false
        default: ""
      record_video:
        description: "Record screen video (true/false)"
        required: false
        default: "true"
      run_ported_tests:
        description: "Execute iOS Appium tests (true/false). False collects tests as skipped."
        required: false
        default: "true"
      release_tag:
        description: "GitHub Release tag containing the IPA (leave blank to auto-detect latest)"
        required: false
        default: ""
  schedule:
    - cron: "0 12 * * *"  # Daily 12:00 UTC = 6:00 PM BDT (UTC+6)

concurrency:
  group: appium-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appium-ios:
    name: iOS Appium — ${{ matrix.group.name }}
    runs-on: macos-15
    # Each iOS group: ~50 tests × 5 min avg + 60 min WDA pre-warm/setup = ~310 min
    # Use 360 (GitHub max) for the heavier groups (auth+account)
    timeout-minutes: 360
    env:
      RUN_IOS_PORTED_TESTS: ${{ github.event.inputs.run_ported_tests || 'true' }}

    strategy:
      fail-fast: false   # one group failing must not cancel others
      matrix:
        group:
          - name: "auth-account"
            paths: "tests/auth/ tests/account/"
          - name: "payment-commerce"
            paths: "tests/payment/ tests/wallet/ tests/checkout/ tests/promo/"
          - name: "donation-commerce"
            paths: "tests/donation/ tests/gift/ tests/subscription/ tests/cart/"
          - name: "browse-misc"
            paths: "tests/browse/ tests/mosque/ tests/home/ tests/notifications/ tests/streaming/ tests/booking/ tests/orders/"
          - name: "new-features"
            paths: "tests/favourites/ tests/location/ tests/rating/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Obtain IPA from GitHub Release
        if: ${{ env.RUN_IOS_PORTED_TESTS == 'true' }}
        run: |
          set -e
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAGS="$INPUT_TAG ios-ipa-v1.8.2"
          else
            echo "Auto-detecting latest release with iOS IPA..."
            LATEST_TAG=$(gh release list --limit 30 --json tagName,assets \
              --jq '.[] | select(any(.assets[]; .name | endswith(".ipa"))) | .tagName' \
              2>/dev/null | head -1 || echo "")
            TAGS="${LATEST_TAG:-ios-ipa-v1.8.2} ios-ipa-v1.8.2"
          fi

          IPA_OK=false
          for TAG in $TAGS; do
            [ -z "$TAG" ] && continue
            echo "Trying release tag: $TAG"
            for attempt in 1 2 3; do
              if gh release download "$TAG" \
                --repo "${{ github.repository }}" \
                --pattern "qatarat-stage-ios.ipa" \
                --output qatarat-stage-ios.ipa \
                --clobber 2>/dev/null; then
                SIZE=$(stat -f%z qatarat-stage-ios.ipa 2>/dev/null || stat -c%s qatarat-stage-ios.ipa || echo 0)
                if [ "${SIZE:-0}" -ge 1000000 ]; then
                  echo "✅ IPA from release $TAG ($(du -sh qatarat-stage-ios.ipa | cut -f1))"
                  IPA_OK=true
                  break 2
                fi
                echo "File too small (${SIZE} bytes) — might be LFS pointer, trying next tag"
              fi
              [ "$attempt" -lt 3 ] && sleep 10
            done
          done

          if [ "$IPA_OK" = "false" ]; then
            echo "::error::Could not obtain a valid IPA from any release. Tags tried: $TAGS"
            echo "::error::Create a GitHub Release (e.g. ios-ipa-v1.8.3) and upload qatarat-stage-ios.ipa to it."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: testing/appium/requirements.txt

      - name: Install Python deps
        run: pip install -r testing/appium/requirements.txt

      - name: Set up Node 20
        if: ${{ env.RUN_IOS_PORTED_TESTS == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium + XCUITest + ffmpeg
        if: ${{ env.RUN_IOS_PORTED_TESTS == 'true' }}
        run: |
          npm install -g appium
          appium driver install xcuitest
          appium driver install --source=npm appium-flutter-driver || true
          appium driver list --installed
          brew install ffmpeg --quiet 2>/dev/null || true
          brew tap wix/brew 2>/dev/null || true
          brew install wix/brew/applesimutils 2>/dev/null || \
            brew install applesimutils 2>/dev/null || true
          which applesimutils && applesimutils --version || echo "applesimutils not in PATH"

      - name: Boot Simulator and install app
        if: ${{ env.RUN_IOS_PORTED_TESTS == 'true' }}
        run: bash testing/ios_ci_setup.sh qatarat-stage-ios.ipa

      - name: Start iOS screen recording (optional)
        if: ${{ env.RUN_IOS_PORTED_TESTS == 'true' && (github.event.inputs.record_video || 'true') == 'true' && matrix.group.name == 'auth-account' }}
        run: |
          mkdir -p testing/appium/reports
          xcrun simctl io "$SIM_ID" recordVideo \
            testing/appium/reports/ios-appium-raw.mp4 \
            --codec h264 &
          echo $! > /tmp/ios_rec_pid

      - name: Start Appium server
        if: ${{ env.RUN_IOS_PORTED_TESTS == 'true' }}
        run: |
          ulimit -n 65536 || true
          appium --port 4723 \
            --log /tmp/appium-ios.log \
            --log-level warn \
            --relaxed-security &
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://localhost:4723/status | python3 -c \
              "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('value',{}).get('ready') else 1)" 2>/dev/null; then
              echo "✅ Appium ready after $((i*2))s"
              exit 0
            fi
            echo "Waiting for Appium... ($i/30)"
          done
          echo "::error::Appium failed to start within 60s"
          tail -30 /tmp/appium-ios.log
          exit 1

      - name: Pre-warm WebDriverAgent (compile + launch WDA before tests)
        if: ${{ env.RUN_IOS_PORTED_TESTS == 'true' }}
        timeout-minutes: 15
        env:
          PLATFORM: ios
          DEVICE_MODE: simulator
          SIM_ID: ${{ env.SIM_ID }}
          IOS_APP_PATH: ${{ env.IOS_APP_PATH }}
          IOS_VERSION: ${{ env.IOS_VERSION || github.event.inputs.ios_version || '18' }}
          IOS_SIM_NAME: ${{ env.SIM_NAME }}
          APPIUM_SERVER: http://localhost:4723
        run: |
          python3 - <<'PYEOF'
          import os, sys, time
          sys.path.insert(0, 'testing/appium')
          try:
              from appium.options import AppiumOptions
          except ImportError:
              try:
                  from appium.options.common.base import AppiumOptions
              except ImportError:
                  from appium.options.android.uiautomator2.base import UiAutomator2Options as AppiumOptions
          from appium import webdriver
          from capabilities.ios_caps import IOS_SIMULATOR_CAPS
          APPIUM_SERVER = os.environ.get("APPIUM_SERVER", "http://localhost:4723")
          caps = dict(IOS_SIMULATOR_CAPS)
          caps["appium:wdaLaunchTimeout"]        = 600000
          caps["appium:simulatorStartupTimeout"] = 60000
          caps["appium:newCommandTimeout"]        = 60
          try:
              opts = AppiumOptions()
              opts.load_capabilities(caps)
          except Exception:
              opts = AppiumOptions()
              for k, v in caps.items():
                  opts.set_capability(k, v)
          print("Pre-warming WDA — first session compiles WebDriverAgent (~3-5 min)...")
          t0 = time.time()
          ok = False
          try:
              d = webdriver.Remote(APPIUM_SERVER, options=opts)
              print(f"WDA session ready in {time.time()-t0:.0f}s — quitting warmup session")
              d.quit()
              print("WDA pre-warm complete ✅")
              ok = True
          except Exception as e:
              print(f"WDA pre-warm failed after {time.time()-t0:.0f}s: {e}")
              print("Continuing — pytest will attempt sessions anyway")
          gh_env = os.environ.get("GITHUB_ENV")
          if ok and gh_env:
              with open(gh_env, "a") as f:
                  f.write("IOS_WDA_PREBUILT=1\n")
              print("Exported IOS_WDA_PREBUILT=1 — test sessions will reuse compiled WDA")
          PYEOF

      - name: Run iOS Appium Tests — ${{ matrix.group.name }}
        id: run_tests
        timeout-minutes: 290
        env:
          PLATFORM: ios
          DEVICE_MODE: simulator
          SIM_ID: ${{ env.SIM_ID }}
          IOS_SIM_NAME: ${{ env.SIM_NAME }}
          IOS_VERSION: ${{ env.IOS_VERSION || github.event.inputs.ios_version || '18' }}
          IOS_APP_PATH: ${{ env.IOS_APP_PATH }}
          IOS_SIM_COMPATIBLE: ${{ env.IOS_SIM_COMPATIBLE }}
          APPIUM_SERVER: http://localhost:4723
          TEST_MARKER: ${{ github.event.inputs.marker || '' }}
          TEST_PATHS: ${{ matrix.group.paths }}
          GROUP_NAME: ${{ matrix.group.name }}
          TEST_OTP: "1234"
          RUN_IOS_PORTED_TESTS: ${{ env.RUN_IOS_PORTED_TESTS }}
        run: |
          ulimit -n 65536 || true
          bash testing/run_appium_ci.sh

      - name: Log system resources after tests
        if: always()
        run: |
          echo "=== Memory ===" && vm_stat | head -20 || true
          echo "=== Disk ===" && df -h / || true

      - name: Stop and compress iOS recording
        if: always()
        run: |
          RPID=$(cat /tmp/ios_rec_pid 2>/dev/null || echo "")
          if [ -n "$RPID" ]; then
            kill -INT "$RPID" 2>/dev/null || true
            sleep 3
            wait "$RPID" 2>/dev/null || true
          fi
          RAW="testing/appium/reports/ios-appium-raw.mp4"
          OUT="testing/appium/reports/ios-appium.mp4"
          if [ -f "$RAW" ]; then
            ffmpeg -i "$RAW" \
              -vf "scale=480:-2,setsar=1" -r 15 -crf 35 -preset fast \
              -movflags +faststart -y "$OUT" 2>&1 | tail -3 || cp "$RAW" "$OUT"
            rm -f "$RAW"
          fi

      - name: Publish step summary — ${{ matrix.group.name }}
        if: always()
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os, glob, textwrap
          group = os.environ.get("GROUP_NAME", "")
          pat = f"testing/appium/reports/results-{group}.xml" if group else "testing/appium/reports/results.xml"
          files = glob.glob(pat) or glob.glob("testing/appium/reports/results*.xml")
          if not files:
              with open(os.environ.get("GITHUB_STEP_SUMMARY") or "/dev/null", "a") as fh:
                  fh.write(f"## 🍎 iOS Appium — {group}\n\n> No results file — check logs.\n")
              exit(0)
          root = ET.parse(files[0]).getroot()
          def is_infra_skip(raw):
              r = (raw or "").lower()
              return any(p in r for p in [
                  "android-only test", "failed on setup", "timeout >",
                  "cannot connect to appium server", "connection refused", "could not connect",
                  "webdriveragent", "wda", "xcuitest", "no such session", "invalid session id",
                  "simulator not found", "simulator may not be booted",
                  "appium session startup timed out", "ios simulator build required",
                  "architecture mismatch",
              ])
          total = passed = failed = skipped = 0
          rows = ""
          for tc in root.iter("testcase"):
              total += 1
              name = tc.get("name", "")
              classname = tc.get("classname", "").split(".")[-1]
              failure_el = tc.find("failure")
              el = failure_el if failure_el is not None else tc.find("error")
              if el is not None:
                  reason = ((el.get("message") or "") or (el.text or ""))[:120].replace("|","\\|")
                  if is_infra_skip(reason):
                      skipped += 1; icon = "⏭️"
                  else:
                      failed += 1; icon = "❌"
                  rows += f"| {icon} | `{classname}` | {name} | {reason} |\n"
              elif tc.find("skipped") is not None:
                  skipped += 1
                  skip_el = tc.find("skipped")
                  reason = ((skip_el.get("message") or "") if skip_el is not None else "")[:120].replace("|","\\|")
                  rows += f"| ⏭️ | `{classname}` | {name} | {reason} |\n"
              else:
                  passed += 1; icon = "✅"
                  rows += f"| {icon} | `{classname}` | {name} |  |\n"
          executed = passed + failed
          pct = int(passed/executed*100) if executed else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 🍎 iOS Appium — {group}: {passed}/{total} ({pct}%)
          {bar}
          | ✅ Passed | ❌ Failed | ⏭️ Skipped | 📊 Total |
          |----------|----------|-----------|---------|
          | {passed} | {failed} | {skipped} | {total} |

          | Status | Suite | Test | Reason |
          |--------|-------|------|--------|
          {rows if rows else "| — | — | No test details | |\n"}"""
          with open(os.environ.get("GITHUB_STEP_SUMMARY") or "/dev/null", "a") as fh:
              fh.write(textwrap.dedent(summary))
          PYEOF
        env:
          GROUP_NAME: ${{ matrix.group.name }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-ios-allure-${{ matrix.group.name }}-${{ github.run_number }}
          path: testing/appium/allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-ios-junit-${{ matrix.group.name }}-${{ github.run_number }}
          path: testing/appium/reports/results-${{ matrix.group.name }}.xml
          retention-days: 30
          if-no-files-found: warn

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-ios-html-report-${{ matrix.group.name }}-${{ github.run_number }}
          path: testing/appium/reports/report.html
          retention-days: 30
          if-no-files-found: warn

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-ios-screenshots-${{ matrix.group.name }}-${{ github.run_number }}
          path: testing/appium/reports/screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Appium log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-ios-server-log-${{ matrix.group.name }}-${{ github.run_number }}
          path: /tmp/appium-ios.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload iOS recording
        if: ${{ (github.event.inputs.record_video || 'true') == 'true' && matrix.group.name == 'auth-account' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-appium-recording-${{ github.run_number }}
          path: testing/appium/reports/ios-appium.mp4
          retention-days: 7
          if-no-files-found: warn
