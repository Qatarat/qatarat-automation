appId: com.qatarat.app
---
# Flow 38 — Edit profile name and email, save changes
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Select your country"
    optional: true
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to Profile
- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Open Edit Profile
- tapOn:
    text: "Edit Profile"
    optional: true
- tapOn:
    text: "Edit"
    optional: true
- tapOn:
    text: "Update Profile"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Edit first name
- tapOn:
    text: "First Name"
    optional: true
- tapOn:
    text: "Enter first name"
    optional: true
- clearText
- inputText: "Ahmad"
- waitForAnimationToEnd:
    timeout: 2000

# Edit last name
- tapOn:
    text: "Last Name"
    optional: true
- tapOn:
    text: "Enter last name"
    optional: true
- clearText
- inputText: "Al-Rashid"
- waitForAnimationToEnd:
    timeout: 2000

# Edit email
- tapOn:
    text: "Email"
    optional: true
- tapOn:
    text: "Enter email"
    optional: true
- clearText
- inputText: "ahmad.alrashid@example.com"
- waitForAnimationToEnd:
    timeout: 2000

# Save changes
- tapOn:
    text: "Save"
    optional: true
- tapOn:
    text: "Update"
    optional: true
- tapOn:
    text: "Save Changes"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Verify changes saved
- assertVisible:
    text: "Ahmad"
    optional: true
- assertVisible:
    text: "Updated"
    optional: true
- assertVisible:
    text: "Profile Updated"
    optional: true

- takeScreenshot: profile_edit_result
