appId: com.qatarat.app
---
# Flow: Switch app language (Arabic RTL → back to English) and verify UI adapts.
# Smoke covers the two most critical directions; full 4-language coverage lives in
# regression flows 36_language_switch_arabic and 37_language_switch_back.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 12000

# Pick Arabic on onboarding
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "Arabic"
    optional: true
- tapOn:
    text: "عربي"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: language_arabic

# Relaunch and restore English
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 12000
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: language_english_restored
