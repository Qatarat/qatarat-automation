appId: com.qatarat.app
---
# Flow 32 — Check wallet balance, view transaction history
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Select your country"
    optional: true
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to Wallet
- tapOn:
    text: "Wallet"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Verify balance is displayed
- assertVisible:
    text: "Balance"
    optional: true
- assertVisible:
    text: "SAR"
    optional: true

# Open transaction history
- tapOn:
    text: "Transaction History"
    optional: true
- tapOn:
    text: "Transactions"
    optional: true
- tapOn:
    text: "History"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Scroll through transactions
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- scroll
- waitForAnimationToEnd:
    timeout: 2000

# Tap first transaction to view detail
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Go back to wallet main screen
- tapOn:
    text: "Back"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

- takeScreenshot: wallet_balance_view_result
