appId: com.qatarat.app
---
# Flow 34 — Apply a valid promo code during checkout
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Select your country"
    optional: true
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to donate/checkout
- tapOn:
    text: "Donate"
    optional: true
- tapOn:
    text: "Sadaqah"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Select or enter donation amount
- tapOn:
    text: "100"
    optional: true
- tapOn:
    text: "SAR 100"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Proceed to checkout/payment screen
- tapOn:
    text: "Donate Now"
    optional: true
- tapOn:
    text: "Proceed"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Locate promo code field
- tapOn:
    text: "Promo Code"
    optional: true
- tapOn:
    text: "Have a promo code?"
    optional: true
- tapOn:
    text: "Enter promo code"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Enter a valid promo code
- inputText: "QATARAT10"
- tapOn:
    text: "Apply"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Verify discount was applied
- assertVisible:
    text: "Discount"
    optional: true
- assertVisible:
    text: "Applied"
    optional: true
- assertVisible:
    text: "QATARAT10"
    optional: true

- takeScreenshot: promo_code_valid_result
