appId: com.qatarat.app
---
# Flow 29 — Set up a recurring monthly donation subscription
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Select your country"
    optional: true
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to Subscriptions or recurring donation
- tapOn:
    text: "Subscriptions"
    optional: true
- tapOn:
    text: "Recurring Donation"
    optional: true
- tapOn:
    text: "Monthly"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Select a charity/mosque for the subscription
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Set monthly amount
- tapOn:
    text: "Select Amount"
    optional: true
- tapOn:
    text: "100"
    optional: true
- tapOn:
    text: "SAR 100"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Choose monthly frequency
- tapOn:
    text: "Monthly"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Select start date (use default/today)
- tapOn:
    text: "Start Date"
    optional: true
- tapOn:
    text: "Today"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Confirm subscription
- tapOn:
    text: "Subscribe"
    optional: true
- tapOn:
    text: "Confirm Subscription"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Verify subscription created
- assertVisible:
    text: "Subscription"
    optional: true
- assertVisible:
    text: "Active"
    optional: true

- takeScreenshot: donation_recurring_subscription_result
