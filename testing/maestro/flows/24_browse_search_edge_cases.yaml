appId: com.qatarat.app
---
# Flow 24: Browse & Search edge cases
# Pattern mirrors flows 42/43: tap Clear before eraseText to maintain keyboard focus

- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000

# ── Onboarding ──
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Select your country"
    optional: true
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# ── Login ──
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# ── Navigate to Search ──
- tapOn:
    text: "Search"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Search mosques, charities..."
    optional: true
- tapOn:
    text: "Search"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# ── Test 1: Single character ──
- inputText: "a"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Clear"
    optional: true
- eraseText: 50
- waitForAnimationToEnd:
    timeout: 1000

# ── Test 2: Short word (non-Arabic proxy) ──
- tapOn:
    text: "Search mosques, charities..."
    optional: true
- tapOn:
    text: "Search"
    optional: true
- inputText: "mosque"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Clear"
    optional: true
- eraseText: 50
- waitForAnimationToEnd:
    timeout: 1000

# ── Test 3: All-uppercase ──
- tapOn:
    text: "Search mosques, charities..."
    optional: true
- tapOn:
    text: "Search"
    optional: true
- inputText: "MOSQUE"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Clear"
    optional: true
- eraseText: 50
- waitForAnimationToEnd:
    timeout: 1000

# ── Test 4: Gibberish ──
- tapOn:
    text: "Search mosques, charities..."
    optional: true
- tapOn:
    text: "Search"
    optional: true
- inputText: "zzzzzzzzz"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Clear"
    optional: true
- eraseText: 50
- waitForAnimationToEnd:
    timeout: 1000

# ── Test 5: XSS attempt ──
- tapOn:
    text: "Search mosques, charities..."
    optional: true
- tapOn:
    text: "Search"
    optional: true
- inputText: "<script>alert('xss')</script>"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Clear"
    optional: true
- eraseText: 50
- waitForAnimationToEnd:
    timeout: 1000

# ── Test 6: SQL injection ──
- tapOn:
    text: "Search mosques, charities..."
    optional: true
- tapOn:
    text: "Search"
    optional: true
- inputText: "' OR '1'='1"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Clear"
    optional: true
- eraseText: 50
- waitForAnimationToEnd:
    timeout: 2000

- scroll
- waitForAnimationToEnd:
    timeout: 2000

- takeScreenshot: browse_search_edge_cases_complete
