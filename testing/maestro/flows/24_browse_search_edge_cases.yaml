appId: com.qatarat.app
---
# Flow 24: Browse & Search edge cases
# Tests: single char, Arabic query, uppercase, gibberish (no-results), XSS, SQL injection, clear

- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000

# ── Onboarding ──
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Select your country"
    optional: true
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# ── Login ──
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# ── Navigate to Search (same pattern as flows 42/43) ──
- tapOn:
    text: "Search"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Search mosques, charities..."
    optional: true
- tapOn:
    text: "Search"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# ── Test 1: Single character search ──
- inputText: "a"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    text: "Search"
    optional: true

# ── Test 2: Non-ASCII query (Arabic skipped — ADB input doesn't support Unicode on emulator)
- eraseText: 100
- inputText: "mosque"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    text: "Search"
    optional: true

# ── Test 3: All-uppercase search ──
- eraseText: 100
- inputText: "MOSQUE"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    text: "Search"
    optional: true

# ── Test 4: Gibberish — must show empty state ──
- eraseText: 100
- inputText: "zzzzzzzzz"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    text: "Search"
    optional: true

# ── Test 5: XSS attempt ──
- eraseText: 100
- inputText: "<script>alert('xss')</script>"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    text: "Search"
    optional: true

# ── Test 6: SQL injection ──
- eraseText: 100
- inputText: "' OR '1'='1"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    text: "Search"
    optional: true

# ── Test 7: Clear search ──
- eraseText: 100
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: browse_search_edge_cases_complete
