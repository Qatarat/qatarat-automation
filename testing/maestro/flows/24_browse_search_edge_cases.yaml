appId: com.qatarat.app
---
# Flow 24: Browse & Search edge cases
# Tests: single char, Arabic query, uppercase, gibberish (no-results), XSS, SQL injection, clear

- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000

# ── Onboarding ──
- tapOn:
    text: "Select your country"
    optional: true
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# ── Login ──
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# ── Navigate to mosque/service search ──
- tapOn:
    text: "Mosques"
    optional: true
- tapOn:
    text: "Charities"
    optional: true
- tapOn:
    text: "Donate"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Tap the search input to focus it before typing
- tapOn:
    text: "Search"
    optional: true
- tapOn:
    text: "Search mosques"
    optional: true
- tapOn:
    text: "Search..."
    optional: true
- tapOn:
    text: "Find a mosque"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# ── Test 1: Single character search ──
- inputText: "a"
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "Something went wrong"
- assertNotVisible: "500"

# ── Test 2: Arabic text search ──
- eraseText: 100
- inputText: "مسجد"
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "Something went wrong"
- assertNotVisible: "500"

# ── Test 3: All-uppercase search ──
- eraseText: 100
- inputText: "MOSQUE"
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "Something went wrong"

# ── Test 4: Gibberish — must show empty state ──
- eraseText: 100
- inputText: "zzzzzzzzz"
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "Something went wrong"
- assertNotVisible: "500"

# ── Test 5: XSS attempt ──
- eraseText: 100
- inputText: "<script>alert('xss')</script>"
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "Something went wrong"
- assertNotVisible: "500"

# ── Test 6: SQL injection ──
- eraseText: 100
- inputText: "' OR '1'='1"
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "SQL"
- assertNotVisible: "syntax error"
- assertNotVisible: "database error"
- assertNotVisible: "500"

# ── Test 7: Clear search restores listing ──
- eraseText: 100
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "Something went wrong"

- takeScreenshot: browse_search_edge_cases_complete
