[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --alluredir=allure-results
    --html=reports/report.html
    --self-contained-html
    --junit-xml=reports/results.xml
    -v
    --tb=short
log_cli = true
log_cli_level = INFO
markers =
    android: Android-only tests
    ios: iOS-only tests
    payment: Payment flow tests
    gift: Gift card tests
    subscription: Subscription tests
    account: Profile and account tests
    auth: Authentication and login tests
    cart: Cart and quantity tests
    promo: Promo code tests
    orders: Order management tests
    negative: Negative / invalid-data tests (expected-failure paths)
    boundary: Boundary value and edge-case tests
    security: Injection and security-probe tests
    browse: Browse and search tests
    checkout: Checkout and order flow tests
    smoke: Fast smoke tests
    regression: Full regression suite
    donation: Donation and Zakat flow tests
    zakat: Zakat calculator tests
    mosque: Mosque search and profile tests
    wallet: Wallet and top-up tests
    home: Home feed tests
    booking: Booking and order management tests
    notifications: Notification centre tests
    streaming: Live streaming and broadcast tests
